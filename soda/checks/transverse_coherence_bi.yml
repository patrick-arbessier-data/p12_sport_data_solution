checks for metier.vw_bi_activite:
- row_count > 0:
    name: 'Volumétrie : au moins 1 ligne'
- values in (cle_salarie) must exist in metier.vw_bi_salarie (cle_salarie):
    name: 'Référentiel : cle_salarie présent dans metier.vw_bi_salarie(cle_salarie)'
- failed rows:
    name: Cohérence type activité inconnu
    fail query: "SELECT *\nFROM metier.vw_bi_activite\nWHERE NOT (\n  (type_activite_inconnu = true  AND type_activite_normalise\
      \ = 'INCONNU')\n  OR\n  (type_activite_inconnu = false AND type_activite_normalise <> 'INCONNU')\n);\n"
- failed rows:
    name: Cohérence catégorie activité inconnue
    fail query: "SELECT *\nFROM metier.vw_bi_activite\nWHERE NOT (\n  (categorie_activite_inconnu = true  AND categorie_activite_normalise\
      \ = 'INCONNU')\n  OR\n  (categorie_activite_inconnu = false AND categorie_activite_normalise <> 'INCONNU')\n);\n"
- failed rows:
    name: Valeurs négatives interdites hors exclusions
    fail query: "SELECT *\nFROM metier.vw_bi_activite\nWHERE NOT (\n  est_exclue_structurelle = true\n  OR (\n    duree_sec\
      \ >= 0\n    AND (distance_m IS NULL OR distance_m >= 0)\n  )\n);\n"
