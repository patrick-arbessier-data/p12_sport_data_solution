# Configuration des paramètres contextuels et métier du pipeline
# Utilisée pour la génération des déclaratifs, pour les transformations et règles métiers d'éligibilité

regles_eligibilite:
  fenetre_activites:
    # Fenêtre temporelle utilisée pour compter les activités (journées bien-être)
    # Types supportés : GLISSANTE_MENSUELLE (ANNEE_CIVILE non implémentée)
    type_fenetre: GLISSANTE_MENSUELLE

    # Nombre de mois à couvrir (12 = 12 derniers mois)
    nb_mois: 12

    # Si false : prendre uniquement des mois complets (exécution le 17/12/2025 -> 01/12/2024..30/11/2025)
    # Si true  : inclure le mois courant (exécution le 17/12/2025 -> 01/01/2025..17/12/2025 ou équivalent
    # -----------------------------------------------------------------------------------------------------
    # Attention ! l'implémentation de l'option inclure_mois_courant: FALSE n'est pas finalisée. 
    # L'activation de cette option nécessite la création d'une variable d'environnement récupérée 
    # par Kestra puis implémentée dans la tâche SODA Table (le module MOD70).
    # Activer inclure_mois_courant: FALSE provoquera une erreur lors des contrôles SODA Tables (activités)
    # -----------------------------------------------------------------------------------------------------
    inclure_mois_courant: true

    # Référence temporelle : date d'exécution en Europe/Paris
    reference_date: DATE_EXECUTION_PARIS

activites:
 # Scénario de volumétrie : pessimiste | realiste | optimiste
  scenario: "realiste"

  # Volume total d’activités générées sur la fenêtre (12 mois).
  # Reco POC (rapports BI) avec les bornes actuelles :
  # - pessimiste : 3000–5500 (max conseillé ~6000)
  # - realiste  : 6000–10000 (max conseillé ~10800)  # défaut : 7000
  # - optimiste : 10000–14000 (max conseillé ~15300)
  nb_lignes: 8000

  # Scénarios (volumétrie mensuelle par profil) : [MIN, MAX]
  #
  # A) Format des bornes (obligatoire)
  # - Pour chaque profil : [MIN, MAX] avec MIN et MAX entiers
  # - Contrainte : 0 <= MIN <= MAX
  #
  # B) Unicité “1 activité / jour / salarié” (obligatoire)
  # - L’heure est fixée à 12:00 (Europe/Paris) : l’unicité se vérifie au niveau du JOUR.
  # - Pour éviter les collisions : MAX doit rester <= nb de jours disponibles dans le mois.
  #   Reco robuste : MAX <= 28 (compatible février).
  #   Si inclure_mois_courant=true : le mois courant est limité à “aujourd’hui” (jour),
  #   donc un MAX trop élevé peut forcer des redistributions et casser les contrôles.
  #
  # D) Capacité globale (obligatoire)
  # - Le générateur sur-génère puis sous-échantillonne : cible_interne = nb_lignes * facteur_surgeneration
  # - La config doit permettre d’atteindre cette cible (sinon : génération insuffisante / config impossible).
  scenarios:
    pessimiste:
      faible: [0, 1]
      moyen:  [2, 4]
      eleve:  [5, 7]
    realiste:
      faible: [0, 3]
      moyen:  [4, 7]
      eleve:  [8, 12]
    optimiste:
      faible: [0, 5]
      moyen:  [6, 10]
      eleve:  [11, 16]

  # Sur-génération puis sous-échantillonnage (doit rester > 1.0)
  facteur_surgeneration: 1.30

  # Seed pour reproductibilité
  random_seed: 42


referentiels:
  # Valeurs attendues dans la colonne mod_depl_decl du fichier RH
  modes_deplacement:
    - "Transports en commun"
    - "véhicule thermique/électrique"
    - "Marche/running"
    - "Vélo/Trottinette/Autres"

  # Valeurs attendues dans  colonne "Pratique d'un sport" du fichier Données Sportives
  # Sert à alimenter metier.activite.type_activite lors de la simulation.
  sports_pratiques:
    - "Randonnée"
    - "Triathlon"
    - "Runing"
    - "Natation"
    - "Escalade"
    - "Équitation"
    - "Voile"
    - "Tennis de table"
    - "Football"
    - "Rugby"
    - "Judo"
    - "Basketball"
    - "Boxe"
    - "Tennis"
    - "Badminton"

regles_simulation:
  # Références de temps pour construire des durées plausibles,
  # puis pour déduire une distance.
  refs_temps_par_mode:
    marche_running:
      distance_ref_km: 15
      duree_ref_sec: 8100   # [Estimé] 2h15
    velo_trott_autres:
      distance_ref_km: 25
      duree_ref_sec: 4500   # [Estimé] 1h15
    
  # Plage de distance relative à la distance de référence (15 km ou 25 km)
  distance_ratio:
    min: 0.10
    max: 1.00
    
  # Bornes de durée (en secondes) selon la catégorie de sport.
  duree_bornes_sec:
    endurance:
      min: 1200   # 20 min
      max: 10800  # 3 h
    non_endurance:
      min: 900    # 15 min
      max: 7200   # 2 h

  # Variabilité autour du temps de référence (fourchette bas/haut)
  facteurs_duree:
    min: 0.80
    max: 1.20
  
  #Sports considérés comme catégorie vitesse/distance pour simulation
  # Règle associée : si mod_depl_decl est non actif, alors :
  #  si type_activite ∈ sports_endurance → référence marche_running
  #  sinon → référence velo_trott_autres
  sports_endurance:
    - "Randonnée"
    - "Triathlon"
    - "Runing"
    - "Natation"

# Sports n'appartenant pas à la section précédente. 
# La distance parcourue n'est pas prise en compte.
  sports_non_endurance:
    - "Escalade"
    - "Équitation"
    - "Voile"
    - "Tennis de table"
    - "Football"
    - "Rugby"
    - "Judo"
    - "Basketball"
    - "Boxe"
    - "Tennis"
    - "Badminton"